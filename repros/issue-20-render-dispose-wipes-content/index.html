      style="border: 1px solid #999; border-radius: 8px; padding: 12px; margin: 12px 0; max-width: 40rem"

        the interactive widget below is unmounted.
      </p>
    </article>

    <!-- Solid owns only #root. -->
    <div id="root"></div>
    <script src="/src/index.jsx" type="module"></script>
