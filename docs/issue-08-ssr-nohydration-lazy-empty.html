      <input type="hidden" name="project[files][README.md]" value="# issue-08 — `lazy()` in `&lt;NoHydration&gt;` renders nothing

`lazy()` inside `&lt;NoHydration&gt;` silently renders **nothing** during SSR. The
moduleUrl/manifest requirements are correctly waived for no-hydrate zones, but
the server `lazy()` wrapper bails out *before* creating the render memo, so the
resolved content is dropped — leaving an empty hole. The stream still completes
&quot;successfully&quot;.

Run `npm run repro` and read the **terminal** verdict (`PASS`/`FAIL`).

Pinned to published `2.0.0-beta.16` (npm); also reproduces on `2.0.0-beta.15`.
Issue draft: `issue-drafts/08-nohydration-lazy-renders-nothing.md`.

      <input type="hidden" name="project[files][src/repro.jsx]" value="// Server-only reproduction — run in the StackBlitz terminal (npm run repro).
// lazy() inside &lt;NoHydration&gt; silently renders NOTHING during SSR. The
// moduleUrl/manifest guards are correctly waived for no-hydrate zones, but the
// server lazy() wrapper bails out before creating the render memo, so the
// resolved content is dropped — leaving an empty hole. — Solid 2.0.0-beta.16
// Issue draft: issue-drafts/08-nohydration-lazy-renders-nothing.md
import { renderToStringAsync, NoHydration } from &quot;@solidjs/web&quot;;
import { lazy } from &quot;solid-js&quot;;

const StaticFooter = lazy(async () =&gt; ({
  default: () =&gt; &lt;p&gt;static lazy content&lt;/p&gt;,
}));

function App() {
  return (
    &lt;NoHydration&gt;
      &lt;div&gt;
        before-
        &lt;StaticFooter /&gt;
        -after
      &lt;/div&gt;
    &lt;/NoHydration&gt;
  );
}

const html = await renderToStringAsync(() =&gt; &lt;App /&gt;);

// The lazy component's content must appear in the static HTML.
const ok = html.includes(&quot;static lazy content&quot;);

console.log(&quot;=== lazy() inside &lt;NoHydration&gt; renders nothing (server-only) ===&quot;);
console.log(ok ? &quot;PASS — bug fixed&quot; : &quot;FAIL — bug reproduced&quot;);
console.log(&quot;expected: &lt;div&gt;before-…&lt;p&gt;static lazy content&lt;/p&gt;…-after&lt;/div&gt;&quot;);
console.log(&quot;actual html:&quot;, html);
" />
