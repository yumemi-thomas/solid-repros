<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Open repro in StackBlitz</title>
  <style>
    body { font-family: system-ui, sans-serif; margin: 3rem auto; max-width: 42rem; padding: 0 1rem; color: #dde; background: #0e1116; }
    a { color: #7cc; } code { color: #9fd; }
    .err { color: #f77; } .muted { color: #889; }
    button { font: inherit; padding: .6rem 1rem; border: 1px solid #7cc; background: transparent; color: #7cc; border-radius: 6px; cursor: pointer; }
  </style>
</head>
<body>
  <h1 id="title">Loading repro…</h1>
  <p id="status" class="muted">Fetching files from GitHub…</p>
  <p id="fallback" style="display:none"><button id="go">Open in StackBlitz</button></p>
  <p class="muted">Files are fetched live from <code>repros/&lt;slug&gt;</code> on GitHub and
    opened in StackBlitz via the official SDK (<code>@stackblitz/sdk</code>
    <code>openProject</code>) — no repo import. <a href="./">All repros</a>.</p>

  <script type="module">
    import sdk from "https://esm.sh/@stackblitz/sdk@1";

    const params = new URLSearchParams(location.search);
    const slug = params.get("repro");
    const statusEl = document.getElementById("status");
    const titleEl = document.getElementById("title");
    const fail = msg => { statusEl.innerHTML = `<span class="err">${msg}</span>`; };

    async function main() {
      if (!slug) return fail('Missing <code>?repro=&lt;slug&gt;</code>. See <a href="./">the index</a>.');
      const manifest = await fetch("./repros.json").then(r => r.json());
      const { owner, repo, branch, repros } = manifest;
      const entry = repros[slug];
      if (!entry) return fail(`Unknown repro <code>${slug}</code>. See <a href="./">the index</a>.`);
      titleEl.textContent = entry.title;

      const rawBase = `https://raw.githubusercontent.com/${owner}/${repo}/${branch}/repros/${slug}/`;
      const pairs = await Promise.all(
        entry.files.map(async p => {
          const res = await fetch(rawBase + p);
          if (!res.ok) throw new Error(`${p} → HTTP ${res.status}`);
          return [p, await res.text()];
        }),
      );
      const files = Object.fromEntries(pairs);

      const project = {
        title: entry.title,
        description: `Solid 2.0 repro — ${entry.title}`,
        template: "node",
        files,
      };
      const options = { openFile: entry.openFile, newWindow: false };

      const open = () => sdk.openProject(project, options);
      statusEl.textContent = `Loaded ${pairs.length} files — opening StackBlitz…`;
      document.getElementById("go").onclick = open;
      document.getElementById("fallback").style.display = "";
      open();
    }

    main().catch(e => fail(`Failed to load repro: ${e.message}`));
  </script>
</body>
</html>
