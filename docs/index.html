<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>solid-repros — StackBlitz launchers</title>
    <style>
      body {
        font-family: system-ui, sans-serif;
        margin: 3rem auto;
        max-width: 44rem;
        padding: 0 1rem;
        color: #dde;
        background: #0e1116;
      }
      a {
        color: #7cc;
      }
      em {
        color: #889;
      }
      li {
        margin: 0.3rem 0;
      }
    </style>
  </head>
  <body>
    <h1>solid-repros</h1>
    <p>
      Each link fetches the repro's files live from GitHub and POSTs them straight into StackBlitz
      (no repo import). Source lives in
      <a href="https://github.com/yumemi-thomas/solid-repros/tree/main/repros">repros/</a>.
    </p>
    <ul id="list">
      <li>Loading…</li>
    </ul>
    <script type="module">
      const m = await fetch("./repros.json").then(r => r.json());
      document.getElementById("list").innerHTML = Object.entries(m.repros)
        .sort(([a], [b]) => a.localeCompare(b))
        .map(
          ([slug, r]) =>
            `<li><a href="./launch.html?repro=${encodeURIComponent(slug)}">${slug}</a> — <em>${r.kind === "ssr" ? "SSR (terminal)" : "client (preview)"}</em></li>`
        )
        .join("");
    </script>
  </body>
</html>
