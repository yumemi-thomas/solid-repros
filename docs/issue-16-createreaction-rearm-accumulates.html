      <input type="hidden" name="project[files][README.md]" value="# issue-16 — `createReaction` re-arm accumulates arms

`createReaction` should replace its tracked sources when you re-arm it before it
fires (1.x semantics). In Solid 2.0 each `track()` adds a *new* deferred arm
without disposing the superseded one, so the reaction fires more than once.

Run `npm run dev` and use the buttons:

1. **arm (track a, then b)** — arms on `a`, then re-arms on `b` before firing.
2. **bump a** — should stay `0` (the `a` arm was superseded by `track(b)`);
   2.0 shows `1`.
3. **bump b** — 1.x total `1`, 2.0 total `2`: both arms stayed live.

Pinned to published `2.0.0-beta.16` (npm). Issue draft:
`issue-drafts/16-createreaction-rearm-accumulates.md`.

      <input type="hidden" name="project[files][src/App.jsx]" value="// Re-arming createReaction before it fires accumulates arms instead of
// replacing tracked sources (1.x replaces). — Solid 2.0.0-beta.16
// Arm, then bump a: 1.x leaves the counter at 0 (a was superseded); 2.0 shows 1.
// Issue draft: issue-drafts/16-createreaction-rearm-accumulates.md
import { createSignal, createReaction, flush } from &quot;solid-js&quot;;

export default function App() {
  const [a, setA] = createSignal(0);
  const [b, setB] = createSignal(0);
  const [fired, setFired] = createSignal(0);
  let count = 0; // reaction writes a plain counter (a signal write here halts)

  // No createRoot: the component is the owner createReaction needs.
  const track = createReaction(() =&gt; {
    count++;
  });

  // No queueMicrotask: bumps run in click handlers, each its own flush.
  const bump = (set, get) =&gt; () =&gt; {
    set(get() + 1);
    flush();
    setFired(count);
  };

  return (
    &lt;main style={{ &quot;font-family&quot;: &quot;system-ui&quot;, padding: &quot;16px&quot; }}&gt;
      &lt;h2&gt;createReaction re-arm accumulates arms&lt;/h2&gt;
      &lt;p&gt;reaction fired: &lt;b&gt;{fired()}&lt;/b&gt; time(s)&lt;/p&gt;
      &lt;button onClick={() =&gt; { track(() =&gt; a()); track(() =&gt; b()); }}&gt;
        arm (track a, then b)
      &lt;/button&gt;{&quot; &quot;}
      &lt;button onClick={bump(setA, a)}&gt;bump a&lt;/button&gt;{&quot; &quot;}
      &lt;button onClick={bump(setB, b)}&gt;bump b&lt;/button&gt;
      &lt;p style={{ color: &quot;#666&quot; }}&gt;
        Arm, then bump a → should stay 0 (a was superseded by track(b)); 2.0
        shows 1. Then bump b → 1.x total 1, 2.0 total 2: both arms stayed live.
      &lt;/p&gt;
    &lt;/main&gt;
  );
}
